services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    platform: linux/amd64
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337", "--block-time", "1"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 10

  aztec-sandbox:
    image: aztecprotocol/aztec:4.1.3
    platform: linux/amd64
    command: ["start", "--local-network"]
    ports:
      - "8080:8080"
    environment:
      ETHEREUM_HOSTS: http://anvil:8545
      L1_CHAIN_ID: "31337"
      LOG_LEVEL: info
    depends_on:
      anvil:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 120s

  pxe-bridge:
    build: .
    ports:
      - "8547:8547"
    environment:
      # Well-known Hardhat/Anvil test key #0 -- never use with real funds
      PXE_BRIDGE_SECRET_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      AZTEC_NODE_URL: http://aztec-sandbox:8080
    depends_on:
      aztec-sandbox:
        condition: service_healthy
